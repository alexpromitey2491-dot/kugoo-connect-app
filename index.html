<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kugoo Connect</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 15px;
        }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #0077ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Загрузка помощника Kugoo...</div>
    </div>
    
    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbyn_BpriYYNtjZOPQ8fXqXbgfDKsDmF3jE4Ia16wgMyYRsJNaL4H-pojF-uvTMGJ1Q/exec"
        allow="camera; microphone; clipboard-read; clipboard-write"
    ></iframe>
    
    <script src="https://vk.com/js/api/xd_connection.js?2"></script>
    <script>
        // Инициализация VK Bridge
        function initVK() {
            if (typeof VK !== 'undefined' && VK.init) {
                VK.init(function() {
                    console.log('VK Bridge инициализирован');
                    // Отправляем событие инициализации
                    if (typeof VKWebAppInit !== 'undefined') {
                        VKWebAppInit();
                    } else if (window.vkBridge) {
                        window.vkBridge.send('VKWebAppInit');
                    }
                }, function() {
                    console.log('Ошибка инициализации VK Bridge');
                });
            } else {
                // Если VK не загрузился, пробуем альтернативный способ
                setTimeout(initVK, 500);
            }
        }
        
        // Запускаем инициализацию после загрузки страницы
        document.addEventListener('DOMContentLoaded', initVK);
        
        // Обработка iframe
        const iframe = document.getElementById('appFrame');
        const loader = document.getElementById('loader');
        
        iframe.addEventListener('load', function() {
            // Скрываем загрузчик через 500мс после загрузки iframe
            setTimeout(function() {
                loader.style.display = 'none';
            }, 500);
        });
        
        // Запасной таймер - скрыть загрузчик через 10 секунд в любом случае
        setTimeout(function() {
            loader.style.display = 'none';
        }, 10000);
        
        // Обработка ошибок iframe
        iframe.addEventListener('error', function() {
            console.error('Ошибка загрузки iframe');
            document.querySelector('.loader-text').textContent = 'Ошибка загрузки. Проверьте интернет.';
        });
    </script>
</body>
</html>
